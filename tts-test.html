<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiMo 语音合成测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            resize: none;
            font-size: 16px;
            line-height: 1.5;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea::placeholder {
            color: #aaa;
        }

        .api-key-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: monospace;
        }

        .api-key-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-synth {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-synth:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-play {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-play:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(17, 153, 142, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            transition: all 0.3s;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .audio-player {
            margin-top: 25px;
            display: none;
        }

        .audio-player.show {
            display: block;
        }

        audio {
            width: 100%;
            border-radius: 10px;
            background: #f5f5f5;
        }

        .style-options {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .style-options h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 16px;
        }

        .style-select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .style-select:focus {
            outline: none;
            border-color: #667eea;
        }

        .voice-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .voice-option {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            font-size: 14px;
        }

        .voice-option:hover {
            border-color: #667eea;
            background: #f0f0ff;
        }

        .voice-option.active {
            border-color: #667eea;
            background: #eef2ff;
            color: #667eea;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ MiMo 语音合成测试</h1>
        <p class="subtitle">输入文本，点击合成按钮生成语音</p>

        <div class="input-group">
            <label for="apiKey">API Key</label>
            <input type="text" id="apiKey" class="api-key-input" placeholder="请输入你的 MiMo API Key">
        </div>

        <div class="input-group">
            <label for="textInput">输入文本</label>
            <textarea id="textInput" placeholder="请输入要转换为语音的文本内容..."></textarea>
        </div>

        <div class="style-options">
            <h3>🎨 风格选项</h3>
            <select id="styleSelect" class="style-select">
                <option value="">默认风格</option>
                <option value="用欢快活泼的语气说话">欢快活泼</option>
                <option value="用温柔甜美的声音说话">温柔甜美</option>
                <option value="用沉稳庄重的语气播报新闻">沉稳庄重</option>
                <option value="用充满激情的语调演讲">充满激情</option>
                <option value="用轻柔舒缓的声音朗读">轻柔舒缓</option>
            </select>

            <div class="voice-options">
                <div class="voice-option active" data-voice="mimo_default">默认音色</div>
                <div class="voice-option" data-voice="冰糖">冰糖 (中文女声)</div>
                <div class="voice-option" data-voice="茉莉">茉莉 (中文女声)</div>
                <div class="voice-option" data-voice="苏打">苏打 (中文男声)</div>
                <div class="voice-option" data-voice="白桦">白桦 (中文男声)</div>
                <div class="voice-option" data-voice="Mia">Mia (英文女声)</div>
                <div class="voice-option" data-voice="Chloe">Chloe (英文女声)</div>
                <div class="voice-option" data-voice="Milo">Milo (英文男声)</div>
                <div class="voice-option" data-voice="Dean">Dean (英文男声)</div>
            </div>
        </div>

        <div class="controls">
            <button id="synthBtn" class="btn btn-synth" onclick="synthesizeSpeech()">
                <span>🔊 语音合成</span>
            </button>
            <button id="playBtn" class="btn btn-play" disabled onclick="playAudio()">
                <span>▶️ 播放语音</span>
            </button>
        </div>

        <div id="status" class="status" style="display: none;"></div>

        <div id="audioPlayer" class="audio-player">
            <audio id="audio" controls></audio>
        </div>
    </div>

    <script>
        let audioBlob = null;
        let selectedVoice = 'mimo_default';

        document.querySelectorAll('.voice-option').forEach(option => {
            option.addEventListener('click', () => {
                document.querySelectorAll('.voice-option').forEach(opt => opt.classList.remove('active'));
                option.classList.add('active');
                selectedVoice = option.dataset.voice;
            });
        });

        async function synthesizeSpeech() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const text = document.getElementById('textInput').value.trim();
            const style = document.getElementById('styleSelect').value;

            if (!apiKey) {
                showStatus('请先输入 API Key', 'error');
                return;
            }

            if (!text) {
                showStatus('请输入要合成的文本', 'error');
                return;
            }

            const synthBtn = document.getElementById('synthBtn');
            synthBtn.disabled = true;
            synthBtn.innerHTML = '<span class="loading"></span><span>合成中...</span>';
            showStatus('正在合成语音，请稍候...', 'info');

            try {
                const response = await fetch('http://localhost:5000/api/tts', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        apiKey: apiKey,
                        text: text,
                        style: style,
                        voice: selectedVoice
                    })
                });

                const result = await response.json();
                
                console.log('服务器响应:', result);
                
                if (!result.success) {
                    let errorMsg = result.message || '合成失败';
                    if (result.code === 401) {
                        errorMsg = '无效的API Key，请检查您的API密钥';
                    } else if (result.code === 400) {
                        errorMsg = '参数错误，请检查输入内容';
                    }
                    // 如果有详细信息，也显示出来
                    if (result.details) {
                        errorMsg += ` (详情: ${JSON.stringify(result.details).substring(0, 100)}...)`;
                    }
                    throw new Error(errorMsg);
                }

                const audioData = result.audioData;
                const audioBytes = Uint8Array.from(atob(audioData), c => c.charCodeAt(0));
                audioBlob = new Blob([audioBytes], { type: 'audio/mpeg' });
                const audioUrl = URL.createObjectURL(audioBlob);
                
                document.getElementById('audio').src = audioUrl;
                document.getElementById('audioPlayer').classList.add('show');
                document.getElementById('playBtn').disabled = false;

                showStatus('✅ 语音合成成功！', 'success');
                
            } catch (error) {
                console.error('合成失败:', error);
                showStatus(`❌ 合成失败: ${error.message}`, 'error');
            } finally {
                synthBtn.disabled = false;
                synthBtn.innerHTML = '<span>🔊 语音合成</span>';
            }
        }

        function playAudio() {
            const audio = document.getElementById('audio');
            audio.play().catch(error => {
                console.error('播放失败:', error);
                showStatus('❌ 播放失败，请检查浏览器设置', 'error');
            });
        }

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
            status.style.display = 'block';
        }
    </script>
</body>
</html>
